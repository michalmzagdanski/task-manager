<head>
    <meta charset="UTF-8">
    <title>Lista zadań</title>
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#111827">
</head>

<body>

    <h1>My Task Manager</h1>
    <p id="counter">Tasks: 0</p>
    <select id="priorityInput">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
    </select>
    <input id="taskInput" type="text" onkeydown="checkEnter(event)">
    <input id="notesInput" type="text" placeholder="Notes...">
    <input id="dueDateInput" type="date" onkeydown="checkEnter(event)">
    <select id="sortSelect">
        <option value="priority">Priority</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
    </select>
    <button onclick="addTask()">Add task</button>
    <button onclick="setFilter('highPriority')">Important!!</button>
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('active')">Active</button>
    <button onclick="setFilter('done')">Done</button>
    <button onclick="setFilter('overdue')">⛔ Overdue</button>
    <button onclick="setFilter('dueToday')">📅 Today</button>
    <button onclick="clearCompleted()">🧹 Clear completed</button>
    <input id="searchInput" type="text" placeholder="Search..." onkeyup="renderTasks()" />

    <ul id="taskList"></ul>
    <div id="taskDetails">
    </div>
    <div id="editModal" class="hidden">
        <div class="modal-content">
            <h2>Edit task</h2>

            <input id="editInput" type="text" />
            <select id="editPriorityInput">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <input id="editDueDateInput" type="date" />
            <textarea id="editNotesInput"></textarea>
            <button id="saveEditBtn">Save</button>
            <button id="cancelEditBtn">Cancel</button>
        </div>
    </div>


    <script src="app.js"></script>

</body>
